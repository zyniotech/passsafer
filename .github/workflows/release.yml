# ═══════════════════════════════════════════════════════════════════════
# PassSafer — Auto Release Workflow
# Triggered when a version tag (e.g., v1.6.0) is pushed to GitHub.
# Builds Windows, macOS, and Linux installers and publishes them
# as a GitHub Release. electron-updater uses this release to deliver
# automatic updates to users.
# ═══════════════════════════════════════════════════════════════════════

name: Build & Release

on:
  push:
    tags:
      - 'v*'  # Trigger on tags like v1.6.0, v2.0.0, etc.

permissions:
  contents: write  # Required to create GitHub Releases

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ./Electron
        run: npm ci

      - name: Build & Publish (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: ./Electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Build Windows installer and sign automatically using electron-builder.
        run: npx electron-builder --win --publish always

      - name: Build & Publish (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: ./Electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --publish always

      - name: Build & Publish (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: ./Electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux --publish always
