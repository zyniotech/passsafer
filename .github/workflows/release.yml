# ═══════════════════════════════════════════════════════════════════════
# PassSafer — Auto Release Workflow
# Triggered when a version tag (e.g., v1.6.0) is pushed to GitHub.
# Builds Windows, macOS, and Linux installers and publishes them
# as a GitHub Release. electron-updater uses this release to deliver
# automatic updates to users.
# ═══════════════════════════════════════════════════════════════════════

name: Build & Release

on:
  push:
    tags:
      - 'v*'  # Trigger on tags like v1.6.0, v2.0.0, etc.

permissions:
  contents: write  # Required to create GitHub Releases

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ./Electron
        run: npm ci

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: ./Electron
        run: npx electron-builder --win --publish never

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: ./Electron
        run: npx electron-builder --mac --publish never

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: ./Electron
        run: npx electron-builder --linux --publish never

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            Electron/dist/*.exe
            Electron/dist/*.blockmap
            Electron/dist/*.dmg
            Electron/dist/*.zip
            Electron/dist/*.AppImage
            Electron/dist/latest*.yml
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-artifacts
          pattern: build-*
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
