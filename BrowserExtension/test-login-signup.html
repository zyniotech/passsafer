<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PassSafer Test Forms</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e5e5e5;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #f97316;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        .card {
            background-color: #1e1e1e;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .card h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 20px;
            color: #e5e5e5;
            border-bottom: 1px solid #3a3a3a;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #a3a3a3;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid #3a3a3a;
            background-color: #2a2a2a;
            color: #ffffff;
            font-size: 14px;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #f97316;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .dynamic-section {
            margin-top: 40px;
            text-align: center;
        }
        .dynamic-btn {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .dynamic-btn:hover {
            opacity: 0.9;
        }
        #dynamic-form-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>

    <h1>PassSafer Extension Test Environment</h1>

    <div class="container">
        <!-- Login Formular -->
        <div class="card">
            <h2>Standard Login Form</h2>
            <form id="login-form" action="#" method="POST" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label for="login-username">Email or Username</label>
                    <input type="text" id="login-username" name="username" placeholder="name@domain.com" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" placeholder="••••••••" autocomplete="current-password">
                </div>
                <button type="submit" class="btn">Log In</button>
            </form>
        </div>

        <!-- Signup Formular -->
        <div class="card">
            <h2>Registration Form</h2>
            <form id="signup-form" action="#" method="POST" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" name="email" placeholder="name@domain.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" name="password" placeholder="Secure Password" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="signup-password-confirm">Confirm Password</label>
                    <input type="password" id="signup-password-confirm" name="password_confirm" placeholder="Secure Password" autocomplete="new-password">
                </div>
                <button type="submit" class="btn">Create Account</button>
            </form>
        </div>
    </div>

    <!-- Dynamisches Formular (SPA-Test) -->
    <div class="dynamic-section">
        <h2>SPA Simulator (Dynamic Forms)</h2>
        <p>Click below to dynamically insert a login form into the DOM (tests MutationObserver).</p>
        <button id="add-dynamic-form-btn" class="dynamic-btn">Insert Dynamic Form</button>
        
        <div id="dynamic-form-container"></div>
    </div>

    <script>
        document.getElementById('add-dynamic-form-btn').addEventListener('click', () => {
            const container = document.getElementById('dynamic-form-container');
            container.innerHTML = `
                <div class="card" style="width: 360px; text-align: left;">
                    <h2>Dynamic Login (SPA)</h2>
                    <form id="dynamic-form" onsubmit="event.preventDefault();">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="dyn-user" name="dyn_username" placeholder="Dynamic User" autocomplete="username">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="dyn-pw" name="dyn_password" placeholder="••••••••" autocomplete="current-password">
                        </div>
                        <button type="submit" class="btn">Submit</button>
                    </form>
                </div>
            `;
        });
    </script>
</body>
</html>
