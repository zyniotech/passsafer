<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PassSafer - License Expired</title>
    <link rel="stylesheet" href="license.css">
    <style>
        .expired-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .expired-info {
            background-color: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius);
            padding: 16px;
            margin-bottom: 20px;
            text-align: left;
        }
        .expired-info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
        }
        .expired-info-row span:first-child {
            color: var(--color-text-secondary);
        }
        .expired-info-row span:last-child {
            color: var(--color-text);
            font-weight: 500;
        }
        .expired-message {
            color: var(--color-danger);
            font-size: 14px;
            margin-bottom: 24px;
            padding: 12px;
            background: rgba(231, 76, 60, 0.1);
            border-radius: var(--border-radius);
            border: 1px solid rgba(231, 76, 60, 0.2);
        }
    </style>
</head>
<body>
    <div class="license-container">
        <!-- Header -->
        <div class="license-header">
            <div class="license-logo-glow"></div>
            <div class="expired-icon">⏰</div>
            <h1 class="license-title" style="color: var(--color-danger);">License Expired</h1>
            <p class="license-subtitle">Your PassSafer license has expired</p>
        </div>

        <!-- Info Card -->
        <div class="license-form">
            <div class="expired-info">
                <div class="expired-info-row">
                    <span>Plan</span>
                    <span id="expired-plan">—</span>
                </div>
                <div class="expired-info-row">
                    <span>Purchased</span>
                    <span id="expired-purchased">—</span>
                </div>
                <div class="expired-info-row">
                    <span>Expired on</span>
                    <span id="expired-date" style="color: var(--color-danger);">—</span>
                </div>
            </div>

            <div class="expired-message">
                Your license has expired. Renew your plan to continue using PassSafer.
            </div>

            <!-- Buttons -->
            <div class="license-buttons">
                <button id="renew-btn" class="button primary">Renew License →</button>
                <button id="new-key-btn" class="button secondary">Enter New License Key</button>
            </div>
        </div>
    </div>

    <script>
        const { api } = window;

        // Load expired license info
        (async () => {
            try {
                const info = await api.checkLicenseStatus();
                if (info) {
                    const planNames = {
                        '1year': '1-Year Plan',
                        '5year': '5-Year License',
                        'lifetime': 'Lifetime License'
                    };
                    document.getElementById('expired-plan').textContent = planNames[info.plan] || info.plan;
                    document.getElementById('expired-purchased').textContent = 
                        info.purchasedAt ? new Date(info.purchasedAt).toLocaleDateString() : '—';
                    document.getElementById('expired-date').textContent = 
                        info.expiresAt ? new Date(info.expiresAt).toLocaleDateString() : '—';
                }
            } catch (err) {
                console.error('Failed to load license info:', err);
            }
        })();

        // Renew → Open website
        document.getElementById('renew-btn').addEventListener('click', () => {
            api.openExternal('https://zynio-tech.web.app/#pricing');
        });

        // Enter new key → Switch to license activation window
        document.getElementById('new-key-btn').addEventListener('click', () => {
            api.showLicenseInput();
        });
    </script>
</body>
</html>
