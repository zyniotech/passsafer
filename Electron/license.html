<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PassSafer - License Activation</title>
    <link rel="stylesheet" href="license.css">
</head>
<body>
    <div class="license-container">
        <!-- Logo & Header -->
        <div class="license-header">
            <div class="license-logo-glow"></div>
            <img src="../logos/locked_linux.png" alt="PassSafer" class="license-logo" id="license-logo">
            <h1 class="license-title">PassSafer</h1>
            <p class="license-subtitle">Enter your license key to activate</p>
        </div>

        <!-- License Input -->
        <div class="license-form">
            <div class="license-input-group">
                <label for="license-key-input">License Key</label>
                <input 
                    type="text" 
                    id="license-key-input" 
                    placeholder="PS-XXXX-XXXX-XXXX-XXXX" 
                    maxlength="24"
                    spellcheck="false"
                    autocomplete="off"
                >
            </div>

            <!-- Status Message -->
            <div id="license-status" class="license-status hidden"></div>

            <!-- Buttons -->
            <div class="license-buttons">
                <button id="activate-btn" class="button primary">
                    <span id="activate-text">Activate</span>
                    <span id="activate-spinner" class="spinner hidden"></span>
                </button>
                <button id="import-btn" class="button secondary">
                    Import .pass file
                </button>
            </div>
        </div>

        <!-- Footer -->
        <div class="license-footer">
            <p>Don't have a license?</p>
            <a href="#" id="buy-link" class="license-buy-link">Buy PassSafer →</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('[License] DOM loaded');
            console.log('[License] window.api type:', typeof window.api);

            // Defensive check: show error if preload bridge is missing
            if (!window.api || typeof window.api.activateLicense !== 'function') {
                document.body.innerHTML = '<div style="color:red;padding:40px;font-family:sans-serif;font-size:16px;"><b>Startup Error</b><br><br>window.api is not available (type: ' + typeof window.api + ').<br>The preload script may not be loaded correctly.</div>';
                return;
            }

            const input = document.getElementById('license-key-input');
            const activateBtn = document.getElementById('activate-btn');
            const activateText = document.getElementById('activate-text');
            const activateSpinner = document.getElementById('activate-spinner');
            const statusEl = document.getElementById('license-status');

            function showStatus(message, type) {
                statusEl.textContent = message;
                statusEl.className = 'license-status ' + type;
            }

            // Auto-format key as user types: PS-XXXX-XXXX-XXXX-XXXX
            input.addEventListener('input', function(e) {
                let raw = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
                let formatted = '';
                for (let i = 0; i < raw.length && i < 18; i++) {
                    if (i === 2 || i === 6 || i === 10 || i === 14) formatted += '-';
                    formatted += raw[i];
                }
                e.target.value = formatted;
            });

            // Activate button click
            activateBtn.addEventListener('click', async function() {
                const key = input.value.trim();
                console.log('[License] Activate clicked, key:', key);

                if (!key || key.length < 10) {
                    showStatus('Please enter a valid license key', 'error');
                    return;
                }

                activateText.textContent = 'Validating...';
                activateSpinner.classList.remove('hidden');
                activateBtn.disabled = true;

                try {
                    console.log('[License] Calling window.api.activateLicense...');
                    const result = await window.api.activateLicense(key);
                    console.log('[License] Result:', JSON.stringify(result));

                    if (result && result.valid) {
                        showStatus('✓ License activated successfully!', 'success');
                        // Main process will close this window and open the app
                    } else {
                        showStatus((result && result.reason) || 'Invalid license key', 'error');
                    }
                } catch (err) {
                    console.error('[License] Error:', err);
                    showStatus('Error: ' + (err.message || 'Unknown error occurred'), 'error');
                } finally {
                    activateText.textContent = 'Activate';
                    activateSpinner.classList.add('hidden');
                    activateBtn.disabled = false;
                }
            });

            // Enter key triggers activation
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') activateBtn.click();
            });

            // Import .pass license file
            document.getElementById('import-btn').addEventListener('click', async function() {
                try {
                    const result = await window.api.importLicenseFile();
                    if (result && result.valid) {
                        showStatus('✓ License imported successfully!', 'success');
                    } else {
                        showStatus((result && result.reason) || 'Invalid license file', 'error');
                    }
                } catch (err) {
                    showStatus('Failed to import license file', 'error');
                }
            });

            // Buy link
            document.getElementById('buy-link').addEventListener('click', function(e) {
                e.preventDefault();
                window.api.openExternal('https://zynio-tech.web.app/#pricing');
            });

            console.log('[License] All event listeners registered successfully');
        });
    </script>
</body>
</html>
